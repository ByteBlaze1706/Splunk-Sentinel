<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#0077ff" />
      <stop offset="100%" stop-color="#ff0055" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <drop-shadow dx="0" dy="0" stdDeviation="15" flood-color="#00f0ff" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-text" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="0" stdDeviation="5" flood-color="#00f0ff" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="#040811" />
  <!-- Grid lines -->
  <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350 M 0,400 L 1200,400 M 0,450 L 1200,450 M 0,500 L 1200,500 M 0,550 L 1200,550 M 0,600 L 1200,600" stroke="rgba(0,240,255,0.02)" stroke-width="1"/>
  <path d="M 100,0 L 100,630 M 200,0 L 200,630 M 300,0 L 300,630 M 400,0 L 400,630 M 500,0 L 500,630 M 600,0 L 600,630 M 700,0 L 700,630 M 800,0 L 800,630 M 900,0 L 900,630 M 1000,0 L 1000,630 M 1100,0 L 1100,630" stroke="rgba(0,240,255,0.02)" stroke-width="1"/>
  
  <!-- Large Shield Logo (Left) -->
  <g transform="translate(150, 140)">
    <path d="M150,20 L240,60 C240,165 150,240 150,240 C150,240 60,165 60,60 Z" fill="#0a0f1d" stroke="url(#cyanGrad)" stroke-width="8" filter="url(#glow)" />
    <!-- Stylized letter S inside -->
    <path d="M180,90 C165,75 135,75 120,90 C105,105 114,123 135,129 C156,135 165,147 156,165 C144,183 114,180 105,165" fill="none" stroke="#00f0ff" stroke-width="16" stroke-linecap="round" filter="url(#glow-text)"/>
  </g>

  <!-- Title & Branding (Right) -->
  <g transform="translate(520, 200)">
    <text x="0" y="40" font-family="'Courier New', monospace" font-size="24" fill="#64748b" letter-spacing="4">SYSTEM: ACTIVE // HACKATHON R1</text>
    <text x="0" y="110" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="72" fill="#ffffff">SPLUNK <tspan fill="#00f0ff">SENTINEL</tspan></text>
    <text x="0" y="160" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="24" fill="#cbd5e1">AI-Powered Security Operations Copilot</text>
    <text x="0" y="220" font-family="'Courier New', monospace" font-size="16" fill="#00f0ff" letter-spacing="2">DESIGNED FOR SPLUNK MCP INTEGRATION // REAL-TIME ROADMAP</text>
  </g>

  <!-- Bottom Accent bar -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#cyanGrad)" />
</svg>
