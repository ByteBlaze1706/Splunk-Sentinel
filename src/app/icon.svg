<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#0077ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <drop-shadow dx="0" dy="0" stdDeviation="4" flood-color="#00f0ff" flood-opacity="0.8"/>
    </filter>
  </defs>
  <!-- Shield Background -->
  <path d="M50,12 L82,27 C82,62 50,87 50,87 C50,87 18,62 18,27 Z" fill="#0a0f1d" stroke="url(#cyanGrad)" stroke-width="4.5" filter="url(#glow)" />
  <!-- Stylized Letter S inside Shield -->
  <path d="M60,35 C55,30 45,30 40,35 C35,40 38,46 45,48 C52,50 55,54 52,60 C48,66 38,65 35,60" fill="none" stroke="#00f0ff" stroke-width="6.5" stroke-linecap="round" />
</svg>
