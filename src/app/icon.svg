<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#0077ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <drop-shadow dx="0" dy="0" stdDeviation="3" flood-color="#00f0ff" flood-opacity="0.8"/>
    </filter>
  </defs>
  <!-- Solid Black Background Circle (Ensures shield visibility on all browser themes) -->
  <circle cx="50" cy="50" r="48" fill="#000000" />
  
  <!-- Cyber Shield -->
  <path d="M50,16 L78,28 C78,58 50,80 50,80 C50,80 22,58 22,28 Z" fill="#050a15" stroke="url(#cyanGrad)" stroke-width="5.5" filter="url(#glow)" />
  
  <!-- Clean, Bold Capital S inside Shield -->
  <path d="M60,36 C60,30 40,30 40,37 C40,44 60,44 60,51 C60,58 40,58 40,52" fill="none" stroke="#00f0ff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
</svg>
